name: Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: windows-latest
            msys2_sys: UCRT64
            msys2_pkg_prefix: mingw-w64-ucrt-x86_64
          - os: windows-11-arm
            msys2_sys: UCRT64
            msys2_pkg_prefix: mingw-w64-ucrt-x86_64
    steps:
    - uses: actions/checkout@v6.0.2
      with:
        lfs: false

    # ── Linux steps ────────────────────────────────────────────────────────────
    - name: Install LLVM and Clang
      if: runner.os == 'Linux'
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "21.1.8"
    - name: Install packages (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y liblua5.1-dev libncurses-dev libcurl4-openssl-dev
    - name: Install MicroHs (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p "$HOME/.local/bin"
        # Pin to a known-good commit used for this repository's MicroHs-only
        # architecture migration to keep CI deterministic across reruns.
        microhs_sha="05a3fbd5d73ae6a37111a6ced5b57bb1717b8975"
        microhs_tar="/tmp/microhs.tar.gz"
        # SHA-256 computed from the pinned archive URL:
        # https://github.com/augustss/MicroHs/archive/05a3fbd5d73ae6a37111a6ced5b57bb1717b8975.tar.gz
        microhs_expected_sha256="a1f85821cbae877d0ea3e173235d45c833d9145b2ca9e92e77d284b6730c63b6"
        curl -fsSL "https://github.com/augustss/MicroHs/archive/$microhs_sha.tar.gz" -o "$microhs_tar"
        echo "$microhs_expected_sha256  $microhs_tar" | sha256sum -c -
        tar -xzf "$microhs_tar" -C /tmp
        cd "/tmp/MicroHs-$microhs_sha"
        make minstall
        cp "$HOME/.mcabal/bin/mhs" "$HOME/.local/bin/mhs"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        chmod +x compile*
        ./compile-O2

    # ── Windows steps ──────────────────────────────────────────────────────────
    - name: Set up MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msys2_sys }}
        update: true
        path-type: inherit
        install: >-
          ${{ matrix.msys2_pkg_prefix }}-clang
          ${{ matrix.msys2_pkg_prefix }}-lua51
          curl
          make
    - name: Install MicroHs (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        # Install MSYS2 development tools needed for MicroHs compilation
        pacman -S --noconfirm --needed msys2-devel

        microhs_sha="05a3fbd5d73ae6a37111a6ced5b57bb1717b8975"
        microhs_tar="/tmp/microhs.tar.gz"
        microhs_expected_sha256="a1f85821cbae877d0ea3e173235d45c833d9145b2ca9e92e77d284b6730c63b6"
        curl -fsSL "https://github.com/augustss/MicroHs/archive/$microhs_sha.tar.gz" -o "$microhs_tar"
        echo "$microhs_expected_sha256  $microhs_tar" | sha256sum -c -
        tar -xzf "$microhs_tar" -C /tmp
        cd "/tmp/MicroHs-$microhs_sha"

        # Build MicroHs in MSYS environment (has Unix compatibility headers)
        export MSYSTEM=MSYS
        make minstall
      env:
        MSYSTEM: MSYS
    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        export PATH="$HOME/.mcabal/bin:$PATH"
        cd "$GITHUB_WORKSPACE"
        chmod +x compile*
        ./compile-O2
